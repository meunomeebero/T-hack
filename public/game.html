<body class="game-body">
  <canvas class="confetti-canvas" id="confetti-canvas"></canvas>

  <div class="game-container" id="game-screen">
    <div class="split-screen">
      <div class="player-panel">
        <div class="terminal" id="terminal-left">
          <div class="terminal-header">
            <span id="p1-label">P1: LOCAL</span>
            <span id="terminal-left-tag">TERMINAL HACK</span>
          </div>
          <canvas id="game-canvas-left"></canvas>
        </div>
        <div class="progress-bar">
          <div class="progress-bar-fill" id="progress-left"></div>
        </div>
        <div class="hack-status" id="hack-status">
          <span>SISTEMA HACKEADO: </span><span id="hack-pct">0</span>%
        </div>
        <div class="keyboard" id="keyboard-left"></div>
      </div>

      <div class="player-panel">
        <div class="terminal" id="terminal-right">
          <div class="terminal-header">
            <span id="p2-label">P2: REMOTE</span>
            <span id="terminal-right-tag">WAITING...</span>
          </div>
          <canvas id="game-canvas-right"></canvas>
        </div>
        <div class="progress-bar">
          <div class="progress-bar-fill" id="progress-right"></div>
        </div>
        <div class="hack-status" id="hack-status-right">
          <span>SISTEMA HACKEADO: </span><span id="hack-pct-right">0</span>%
        </div>
        <div class="keyboard" id="keyboard-right"></div>
      </div>
    </div>
  </div>

  <div class="logic-only hidden" id="lobby-screen">
    <span id="ready-status"></span>
    <span id="my-name"></span>
    <span id="opp-name"></span>
    <span id="connection-pill" data-state="connecting"></span>
    <span id="connection-status"></span>
    <span id="status-banner"></span>
    <span id="timer-value"></span>
    <span id="my-round-value"></span>
    <span id="opp-round-value"></span>
    <span id="hud-connection-value"></span>
    <span id="my-state-text"></span>
    <span id="opp-state-text"></span>
    <span id="telemetry-round"></span>
    <span id="telemetry-status"></span>
    <span id="telemetry-input"></span>
    <span id="telemetry-progress"></span>
  </div>

  <div class="result-overlay hidden" id="result-overlay">
    <div class="panel result-card">
      <p class="eyebrow" id="result-eyebrow">Match resolved</p>
      <h2 id="result-text">sistema hackeado</h2>
      <p id="result-sub">resultado indisponivel.</p>

      <div class="result-grid">
        <div class="metric-card">
          <span>seu placar</span>
          <strong id="result-my-score">0 / 5</strong>
        </div>
        <div class="metric-card">
          <span>rival</span>
          <strong id="result-opp-score">0 / 5</strong>
        </div>
      </div>

      <div class="result-actions">
        <button class="action-button primary" id="play-again-btn">&gt; jogar novamente</button>
        <button class="action-button secondary" id="home-btn">&gt; voltar para home</button>
      </div>

      <div class="report-row" id="report-row">
        <button class="report-btn" id="report-btn">&gt; denunciar hacker</button>
        <span class="report-confirm hidden" id="report-confirm">hacker denunciado.</span>
      </div>
    </div>
  </div>

  <script>
    (function() {
      const WS_URL = window.location.protocol === "https:"
        ? "wss://" + window.location.host
        : "ws://" + window.location.host;

      const STORAGE = {
        username: "terminalHackUsername",
        queueAgain: "terminalHackQueueAgain"
      };

      const KEYBOARD_LAYOUT = [
        ["Esc", "1", "2", "3", "4", "5", "6", "7", "8", "9", "0", "-", "="],
        ["Tab", "Q", "W", "E", "R", "T", "Y", "U", "I", "O", "P", "[", "]"],
        ["Caps", "A", "S", "D", "F", "G", "H", "J", "K", "L", ";", "'", "Enter"],
        ["Shift", "Z", "X", "C", "V", "B", "N", "M", ",", ".", "/", "Shift"],
        ["Ctrl", "Win", "Alt", "Space", "Alt", "Win", "Ctrl"]
      ];

      const ASCII_LABELS = [
        "ACCESS VECTOR",
        "PAYLOAD STREAM",
        "STACK OVERFLOW",
        "REMOTE SHELL",
        "ROOT SIGNAL",
        "SYS TRACE"
      ];

      const elements = {
        lobbyScreen: document.getElementById("lobby-screen"),
        gameScreen: document.getElementById("game-screen"),
        readyStatus: document.getElementById("ready-status"),
        statusBanner: document.getElementById("status-banner"),
        myName: document.getElementById("my-name"),
        oppName: document.getElementById("opp-name"),
        p1Label: document.getElementById("p1-label"),
        p2Label: document.getElementById("p2-label"),
        terminalLeftTag: document.getElementById("terminal-left-tag"),
        terminalRightTag: document.getElementById("terminal-right-tag"),
        progressLeft: document.getElementById("progress-left"),
        progressRight: document.getElementById("progress-right"),
        myProgressText: document.getElementById("hack-pct"),
        oppProgressText: document.getElementById("hack-pct-right"),
        myStateText: document.getElementById("my-state-text"),
        oppStateText: document.getElementById("opp-state-text"),
        timerValue: document.getElementById("timer-value"),
        myRoundValue: document.getElementById("my-round-value"),
        oppRoundValue: document.getElementById("opp-round-value"),
        telemetryRound: document.getElementById("telemetry-round"),
        telemetryStatus: document.getElementById("telemetry-status"),
        telemetryInput: document.getElementById("telemetry-input"),
        telemetryProgress: document.getElementById("telemetry-progress"),
        keyboardLeft: document.getElementById("keyboard-left"),
        keyboardRight: document.getElementById("keyboard-right"),
        connectionPill: document.getElementById("connection-pill"),
        connectionStatus: document.getElementById("connection-status"),
        hudConnectionValue: document.getElementById("hud-connection-value"),
        resultOverlay: document.getElementById("result-overlay"),
        resultEyebrow: document.getElementById("result-eyebrow"),
        resultText: document.getElementById("result-text"),
        resultSub: document.getElementById("result-sub"),
        resultMyScore: document.getElementById("result-my-score"),
        resultOppScore: document.getElementById("result-opp-score"),
        playAgainBtn: document.getElementById("play-again-btn"),
        homeBtn: document.getElementById("home-btn"),
        reportBtn: document.getElementById("report-btn"),
        reportConfirm: document.getElementById("report-confirm"),
        reportRow: document.getElementById("report-row"),
        confettiCanvas: document.getElementById("confetti-canvas"),
        canvasLeft: document.getElementById("game-canvas-left"),
        canvasRight: document.getElementById("game-canvas-right")
      };

      let ws = null;
      let reconnectTimer = null;
      let gameData = null;
      let username = "";
      let clientId = "";
      let opponentName = "";
      let commands = [];
      let totalRounds = 10;
      let roundTimeLimitMs = 60000;
      let startTimestamp = null;
      let gameStarted = false;
      let gameOver = false;
      let resultShown = false;
      let gameStartedAt = 0;
      let roundStartedAt = 0;
      let roundMissCount = 0;
      let totalMissCount = 0;
      let totalDeadKeyBlocked = 0;
      const isSpectator = new URLSearchParams(window.location.search).get("spectate") === "1";
      let lastFrameTime = 0;
      let ticker = 0;
      let confettiFrame = null;
      let confettiParticles = [];
      let audioContext = null;
      let audioMaster = null;
      let audioUnlocked = false;
      const effectState = {
        local: createEffectState(),
        remote: createEffectState()
      };

      const activeKeys = {};
      const remoteActiveKeys = {};
      const remoteKeyTimers = {};
      const leftRemoteKeys = {};
      const leftRemoteKeyTimers = {};
      const localState = createPlayerState();
      const remoteState = createPlayerState();

      function createEffectState() {
        return {
          particles: [],
          floatingTexts: [],
          flashes: [],
          glitches: [],
          shake: 0,
          corrupt: 0
        };
      }

      function createPlayerState() {
        return {
          input: "",
          roundIndex: 0,
          completedRounds: 0,
          progress: 0,
          awaitingRoundAck: false,
          disconnected: false
        };
      }

      function init() {
        if (isSpectator) {
          initSpectator();
          return;
        }

        const stored = sessionStorage.getItem("gameData");
        if (!stored) {
          window.location.href = "/index.html";
          return;
        }

        gameData = JSON.parse(stored);
        username = gameData.username || localStorage.getItem(STORAGE.username) || "";
        clientId = gameData.clientId;
        opponentName = gameData.opponent || "OPPONENT";
        commands = Array.isArray(gameData.commands) ? gameData.commands : [];
        totalRounds = gameData.totalRounds || commands.length || 10;
        roundTimeLimitMs = gameData.roundTimeLimitMs || 60000;

        bindUi();
        createKeyboard();
        syncLabels();
        resizeCanvases();
        refreshUi();
        connect();

        try { window.posthog && username && window.posthog.identify(username, { username: username }); } catch (e) {}
        track("game_page_loaded", { opponent: opponentName, total_rounds: totalRounds });
        requestAnimationFrame(gameLoop);
      }

      function initSpectator() {
        const stored = sessionStorage.getItem("spectateData");
        if (!stored) {
          window.location.href = "/index.html";
          return;
        }

        const data = JSON.parse(stored);
        clientId = data.clientId;
        commands = Array.isArray(data.commands) ? data.commands : [];
        totalRounds = data.totalRounds || commands.length || 10;
        roundTimeLimitMs = data.roundTimeLimitMs || 60000;
        gameData = {
          gameId: data.gameId,
          playerIndex: 0,
          opponent: data.player1,
          commands: commands,
          totalRounds: totalRounds,
          roundTimeLimitMs: roundTimeLimitMs,
          clientId: clientId,
          spectate: true,
          player0: data.player0,
          player1: data.player1
        };
        username = data.player0;
        opponentName = data.player1;

        bindUi();
        createKeyboard();
        syncLabels();
        applySpectatorChrome();
        resizeCanvases();
        refreshUi();
        connectSpectator(data);

        if (data.state) {
          gameStarted = true;
          gameStartedAt = Date.now();
          roundStartedAt = Date.now();
          startTimestamp = data.state.startedAt || Date.now();
          applyServerState(data.state);
        }

        track("spectate_view_loaded", { game_id: data.gameId });
        requestAnimationFrame(gameLoop);
      }

      function applySpectatorChrome() {
        if (elements.p1Label) elements.p1Label.textContent = "P1: " + (gameData.player0 || "?");
        if (elements.p2Label) elements.p2Label.textContent = "P2: " + (gameData.player1 || "?");
        if (elements.readyStatus) elements.readyStatus.textContent = "modo espectador";
        document.body.classList.add("spectator-mode");
      }

      function connectSpectator(data) {
        const proto = window.location.protocol === "https:" ? "wss:" : "ws:";
        ws = new WebSocket(proto + "//" + window.location.host);
        ws.onopen = function() {
          ws.send(JSON.stringify({ type: "spectate_match", gameId: data.gameId }));
        };
        ws.onmessage = function(event) {
          handleServerMessage(JSON.parse(event.data));
        };
        ws.onclose = function() {};
        ws.onerror = function() {};
      }

      function bindUi() {
        window.addEventListener("resize", resizeCanvases);
        window.addEventListener("keydown", handleKeyDown);
        window.addEventListener("keyup", handleKeyUp);
        window.addEventListener("pointerdown", unlockAudio, { once: true });

        elements.playAgainBtn.addEventListener("click", function() {
          playUiSound();
          if (!isSpectator) {
            localStorage.setItem(STORAGE.username, username);
            sessionStorage.setItem(STORAGE.queueAgain, "1");
          }
          sessionStorage.removeItem("gameData");
          sessionStorage.removeItem("spectateData");
          window.location.href = "/index.html";
        });

        elements.homeBtn.addEventListener("click", function() {
          playUiSound();
          if (!isSpectator) {
            localStorage.setItem(STORAGE.username, username);
          }
          sessionStorage.removeItem(STORAGE.queueAgain);
          sessionStorage.removeItem("gameData");
          sessionStorage.removeItem("spectateData");
          window.location.href = "/index.html";
        });

        elements.reportBtn.addEventListener("click", function() {
          if (elements.reportBtn.disabled) {
            return;
          }
          playUiSound();
          const target = isSpectator
            ? (gameData.player1 || gameData.opponent)
            : (gameData.opponent || opponentName);
          if (!target) {
            return;
          }
          if (isSocketOpen()) {
            ws.send(JSON.stringify({
              type: "report_player",
              gameId: gameData.gameId,
              target: target
            }));
          }
          elements.reportBtn.disabled = true;
          elements.reportBtn.classList.add("hidden");
          elements.reportConfirm.classList.remove("hidden");
          track("player_reported", { target: target, game_id: gameData.gameId });
        });
      }

      function syncLabels() {
        elements.myName.textContent = username.toUpperCase();
        elements.oppName.textContent = opponentName.toUpperCase();
        elements.p1Label.textContent = isSpectator ? ("P1: " + username.toUpperCase()) : "P1: LOCAL";
        elements.p2Label.textContent = isSpectator ? ("P2: " + opponentName.toUpperCase()) : "P2: REMOTE";
        elements.terminalLeftTag.textContent = "TERMINAL HACK";
        elements.terminalRightTag.textContent = isSpectator ? "ESPECTADOR" : "WAITING...";
      }

      function createKeyboard() {
        elements.keyboardLeft.innerHTML = "";
        elements.keyboardRight.innerHTML = "";

        buildKeyboardInto(elements.keyboardLeft);
        buildKeyboardInto(elements.keyboardRight);
      }

      function buildKeyboardInto(container) {
        KEYBOARD_LAYOUT.forEach(function(row) {
          const rowElement = document.createElement("div");
          rowElement.className = "key-row";

          row.forEach(function(label) {
            const key = document.createElement("div");
            key.className = "key";
            key.textContent = label;
            key.dataset.key = keyNameToDataset(label);

            if (label === "Space") {
              key.classList.add("space");
            } else if (["Tab", "Caps", "Enter", "Esc"].indexOf(label) !== -1) {
              key.classList.add("wide");
            } else if (["Shift", "Ctrl", "Alt", "Win"].indexOf(label) !== -1) {
              key.classList.add("wider");
            }

            rowElement.appendChild(key);
          });

          container.appendChild(rowElement);
        });
      }

      function connect() {
        updateConnectionStatus("connecting");
        ws = new WebSocket(WS_URL);

        ws.onopen = function() {
          updateConnectionStatus("connected");
          clearReconnectTimer();

          ws.send(JSON.stringify({
            type: "resume_game",
            gameId: gameData.gameId,
            clientId: clientId,
            username: username
          }));
        };

        ws.onclose = function() {
          updateConnectionStatus("offline");

          if (!gameOver) {
            setNotice("conexao com o servidor perdida. tentando retomar a partida...", "warning");
            scheduleReconnect();
          }
        };

        ws.onerror = function() {
          updateConnectionStatus("offline");
        };

        ws.onmessage = function(event) {
          handleServerMessage(JSON.parse(event.data));
        };
      }

      function scheduleReconnect() {
        if (reconnectTimer) {
          return;
        }

        reconnectTimer = window.setTimeout(function() {
          reconnectTimer = null;
          connect();
        }, 1500);
      }

      function clearReconnectTimer() {
        if (reconnectTimer) {
          window.clearTimeout(reconnectTimer);
          reconnectTimer = null;
        }
      }

      function handleServerMessage(message) {
        switch (message.type) {
          case "spectate_started":
            commands = Array.isArray(message.commands) ? message.commands : commands;
            totalRounds = message.totalRounds || totalRounds;
            roundTimeLimitMs = message.roundTimeLimitMs || roundTimeLimitMs;
            if (!gameStarted) {
              gameStarted = true;
              gameStartedAt = Date.now();
              roundStartedAt = Date.now();
              startTimestamp = (message.state && message.state.startedAt) || Date.now();
            }
            applyServerState(message.state || null);
            elements.readyStatus.textContent = "modo espectador";
            break;

          case "spectate_error":
            elements.readyStatus.textContent = "partida nao esta mais ativa.";
            window.setTimeout(function() { window.location.href = "/index.html"; }, 1500);
            break;

          case "game_resumed":
            opponentName = message.opponent || opponentName;
            commands = Array.isArray(message.commands) ? message.commands : commands;
            totalRounds = message.totalRounds || totalRounds;
            roundTimeLimitMs = message.roundTimeLimitMs || roundTimeLimitMs;
            syncLabels();
            applyServerState(message.state || null);

            if (isSocketOpen()) {
              ws.send(JSON.stringify({ type: "game_ready", gameId: gameData.gameId }));
            }

            if (!gameStarted && !gameOver) {
              elements.readyStatus.textContent = "terminal reconectado. aguardando oponente...";
            }
            break;

          case "opponent_ready":
            elements.readyStatus.textContent = "oponente confirmou. quase la...";
            break;

          case "game_start":
            startGame(message.startedAt || Date.now(), message.timeLimitMs || roundTimeLimitMs);
            setNotice("partida iniciada. derrube o sistema antes do rival.", "info");
            break;

          case "progress":
            applyProgress(message);
            break;

          case "command_complete":
            applyCommandComplete(message);
            break;

          case "opponent_connection_lost":
            remoteState.disconnected = true;
            elements.readyStatus.textContent = "oponente caiu. aguardando reconexao...";
            setNotice("oponente desconectou. se ele nao voltar, a vitoria sera sua.", "warning");
            refreshUi();
            track("opponent_connection_lost", { opponent: gameData.opponent });
            break;

          case "opponent_reconnected":
            remoteState.disconnected = false;
            setNotice("oponente reconectou. a partida continua.", "success");
            refreshUi();
            track("opponent_reconnected", { opponent: gameData.opponent });
            break;

          case "opponent_disconnected":
            remoteState.disconnected = true;
            finalizeMatch("win", "oponente desconectou. vitoria por abandono.", "forfeit");
            break;

          case "input_rejected":
            localState.input = "";
            localState.progress = 0;
            localState.awaitingRoundAck = false;
            roundMissCount = 0;
            roundStartedAt = Date.now();
            spawnMiss(effectState.local);
            setNotice("input rejeitado, digite mais devagar e com ritmo natural", "warning");
            refreshUi();
            track("input_rejected", { reason: message.reason });
            break;

          case "game_over":
            finalizeFromServer(message);
            break;

          case "error":
            if (!resultShown) {
              finalizeMatch("lose", message.message || "nao foi possivel concluir a partida.", "error");
            }
            break;
        }
      }

      function applyServerState(state) {
        if (!state) {
          return;
        }

        const selfKey = gameData.playerIndex === 0 ? "player0" : "player1";
        const otherKey = gameData.playerIndex === 0 ? "player1" : "player0";
        const selfState = state[selfKey];
        const otherState = state[otherKey];

        if (selfState) {
          localState.input = selfState.input || "";
          localState.roundIndex = selfState.roundIndex || 0;
          localState.completedRounds = selfState.completedRounds || 0;
          localState.progress = selfState.progress || 0;
          localState.awaitingRoundAck = false;
        }

        if (otherState) {
          remoteState.input = otherState.input || "";
          remoteState.roundIndex = otherState.roundIndex || 0;
          remoteState.completedRounds = otherState.completedRounds || 0;
          remoteState.progress = otherState.progress || 0;
          remoteState.disconnected = otherState.connected === false;
        }

        if (state.status === "active" && state.startedAt) {
          startGame(state.startedAt, roundTimeLimitMs);
        }

        if (state.status === "finished" && !resultShown) {
          finalizeFromServer({
            winner: state.winner,
            reason: state.reason
          });
        }

        refreshUi();
      }

      function applyProgress(message) {
        const targetState = message.playerIndex === gameData.playerIndex ? localState : remoteState;

        if (targetState === localState && !isSpectator) {
          if (typeof message.roundIndex === "number") {
            localState.roundIndex = message.roundIndex;
          }
          if (typeof message.completedRounds === "number") {
            localState.completedRounds = message.completedRounds;
          }
          const command = getCurrentCommand(localState);
          localState.awaitingRoundAck = command.length > 0
            && localState.input.length === command.length;
          refreshUi();
          return;
        }

        const previousInputLength = targetState.input.length;
        targetState.input = message.input || "";
        targetState.progress = message.progress || 0;

        if (typeof message.roundIndex === "number") {
          targetState.roundIndex = message.roundIndex;
        }

        if (typeof message.completedRounds === "number") {
          targetState.completedRounds = message.completedRounds;
        }

        if (targetState.input.length > previousInputLength) {
          const command = getCurrentCommand(targetState);
          const cursor = getCursorPoint(targetState, command, false);
          spawnPixelBurst(effectState.remote, cursor.x, cursor.y, "#ffa133", 4);
          spawnFlash(effectState.remote, "#ffa133", 0.1, 0.08);

          const newChar = targetState.input.charAt(targetState.input.length - 1);
          if (isSpectator && targetState === localState) {
            pulseKey(newChar, "left");
          } else if (targetState === remoteState) {
            pulseKey(newChar, "right");
          }
        }

        refreshUi();
      }

      function applyCommandComplete(message) {
        const targetState = message.playerIndex === gameData.playerIndex ? localState : remoteState;
        targetState.completedRounds = typeof message.completedRounds === "number"
          ? message.completedRounds
          : targetState.completedRounds;
        targetState.roundIndex = typeof message.roundIndex === "number"
          ? message.roundIndex
          : targetState.roundIndex;
        targetState.input = "";
        targetState.progress = 0;

        if (targetState === localState) {
          localState.awaitingRoundAck = false;
          spawnRoundClear(effectState.local, true);
          if (!isSpectator) {
            setNotice("round concluido. proximo payload carregado.", "success");
            const command = getCurrentCommand({ roundIndex: (targetState.roundIndex || 1) - 1 });
            track("round_completed", {
              round_index: targetState.completedRounds,
              time_ms: Date.now() - roundStartedAt,
              miss_count: roundMissCount,
              command_length: command ? command.length : 0
            });
            roundStartedAt = Date.now();
            roundMissCount = 0;
          }
        } else {
          spawnRoundClear(effectState.remote, false);
          if (!isSpectator) {
            setNotice("o rival concluiu um round. acelere.", "warning");
          }
        }

        refreshUi();
      }

      function startGame(startedAt, nextTimeLimitMs) {
        if (gameStarted) {
          return;
        }
        gameStarted = true;
        startTimestamp = startedAt || Date.now();
        gameStartedAt = Date.now();
        roundStartedAt = Date.now();
        roundTimeLimitMs = nextTimeLimitMs || roundTimeLimitMs;
        resizeCanvases();
        window.requestAnimationFrame(resizeCanvases);
        elements.readyStatus.textContent = "go";
        spawnBoot(effectState.local);
        spawnBoot(effectState.remote);
        playBootSound();
        refreshUi();
        track("match_started", {
          opponent: gameData.opponent,
          player_index: gameData.playerIndex,
          total_rounds: totalRounds
        });
      }

      function handleKeyDown(event) {
        if (isSpectator) {
          return;
        }

        unlockAudio();
        const normalizedKey = normalizePhysicalKey(event.key);
        if (normalizedKey) {
          activeKeys[normalizedKey] = true;
          refreshKeyboard();
        }

        if (!gameStarted || gameOver) {
          return;
        }

        if (event.key === " ") {
          event.preventDefault();
        }

        if (!isSocketOpen() || localState.awaitingRoundAck) {
          return;
        }

        const command = getCurrentCommand(localState);
        if (!command) {
          return;
        }

        if (event.key === "Backspace") {
          event.preventDefault();

          if (localState.input.length > 0) {
            localState.input = localState.input.slice(0, -1);
            localState.progress = calculateCommandProgress(localState.input, command);
            spawnDeleteEffect(effectState.local);
            sendInput();
            refreshUi();
          }
          return;
        }

        if (event.key === "Dead" || event.isComposing || event.keyCode === 229) {
          totalDeadKeyBlocked += 1;
          track("dead_key_blocked", { event_key: String(event.key || "").slice(0, 8) });
          return;
        }

        if (event.key.length !== 1 && event.key !== " ") {
          return;
        }

        const expectedChar = command[localState.input.length];
        const typedChar = event.key === " " ? " " : event.key;

        if (!expectedChar) {
          return;
        }

        if (stripDiacritics(typedChar).toLowerCase() !== expectedChar.toLowerCase()) {
          spawnMiss(effectState.local);
          roundMissCount += 1;
          totalMissCount += 1;
          return;
        }

        localState.input += expectedChar;
        localState.progress = calculateCommandProgress(localState.input, command);
        localState.awaitingRoundAck = localState.input.length === command.length;
        spawnCorrectKey(effectState.local, localState, command);
        sendInput();
        refreshUi();

        if (localState.awaitingRoundAck) {
          setNotice("payload enviado. aguardando confirmacao do servidor...", "info");
        }
      }

      function handleKeyUp(event) {
        const normalizedKey = normalizePhysicalKey(event.key);
        if (!normalizedKey) {
          return;
        }

        delete activeKeys[normalizedKey];
        refreshKeyboard();
      }

      function stripDiacritics(value) {
        return String(value || "").normalize("NFD").replace(/[̀-ͯ]/g, "");
      }

      function normalizePhysicalKey(value) {
        const key = String(value || "").toLowerCase();

        if (key === " ") {
          return "space";
        }

        if (key === "capslock") {
          return "caps";
        }

        if (key === "control") {
          return "ctrl";
        }

        if (key === "altgraph") {
          return "alt";
        }

        if (key === "meta") {
          return "win";
        }

        return key;
      }

      function keyNameToDataset(label) {
        const lower = label.toLowerCase();
        if (lower === "space") {
          return "space";
        }
        if (lower === "caps") {
          return "caps";
        }
        return lower;
      }

      function sendInput() {
        if (!isSocketOpen()) {
          return;
        }

        ws.send(JSON.stringify({
          type: "game_input",
          gameId: gameData.gameId,
          input: localState.input
        }));
      }

      function refreshKeyboard() {
        const leftSource = isSpectator ? leftRemoteKeys : activeKeys;
        const leftKeys = elements.keyboardLeft.querySelectorAll(".key");
        leftKeys.forEach(function(keyElement) {
          const keyName = keyElement.dataset.key;
          keyElement.classList.toggle("active", Boolean(leftSource[keyName]));
        });
        const rightKeys = elements.keyboardRight.querySelectorAll(".key");
        rightKeys.forEach(function(keyElement) {
          const keyName = keyElement.dataset.key;
          keyElement.classList.toggle("active", Boolean(remoteActiveKeys[keyName]));
        });
      }

      function pulseKey(char, side) {
        if (!char) return;
        const keyName = char === " " ? "space" : char.toLowerCase();
        const keys = side === "left" ? leftRemoteKeys : remoteActiveKeys;
        const timers = side === "left" ? leftRemoteKeyTimers : remoteKeyTimers;
        keys[keyName] = true;
        refreshKeyboard();
        if (timers[keyName]) {
          window.clearTimeout(timers[keyName]);
        }
        timers[keyName] = window.setTimeout(function() {
          delete keys[keyName];
          delete timers[keyName];
          refreshKeyboard();
        }, 140);
      }

      function resizeCanvases() {
        resizeCanvas(elements.canvasLeft);
        resizeCanvas(elements.canvasRight);
      }

      function resizeCanvas(canvas) {
        const rect = canvas.getBoundingClientRect();
        canvas.width = Math.max(1, Math.floor(rect.width));
        canvas.height = Math.max(1, Math.floor(rect.height));
      }

      function gameLoop(timestamp) {
        if (!lastFrameTime) {
          lastFrameTime = timestamp;
        }

        const delta = (timestamp - lastFrameTime) / 1000;
        lastFrameTime = timestamp;
        ticker += delta;
        updateEffects(effectState.local, delta);
        updateEffects(effectState.remote, delta);

        renderTerminal(elements.canvasLeft, localState, true, effectState.local);
        renderTerminal(elements.canvasRight, remoteState, false, effectState.remote);

        if (gameStarted && !gameOver) {
          updateTimer();
        }

        if (confettiParticles.length) {
          updateConfetti();
        }

        requestAnimationFrame(gameLoop);
      }

      function renderTerminal(canvas, state, isLocal, effects) {
        const ctx = canvas.getContext("2d");
        const width = canvas.width;
        const height = canvas.height;
        const command = getCurrentCommand(state);
        const input = state.input || "";
        const cellSize = Math.min(width / 16, height / 9);
        const cols = Math.floor(width / cellSize);
        const rows = Math.floor(height / cellSize);
        const shakeX = effects.shake > 0 ? (Math.random() - 0.5) * effects.shake * 10 : 0;
        const shakeY = effects.shake > 0 ? (Math.random() - 0.5) * effects.shake * 8 : 0;

        ctx.clearRect(0, 0, width, height);
        ctx.save();
        ctx.translate(Math.round(shakeX), Math.round(shakeY));
        ctx.strokeStyle = "#333333";
        ctx.lineWidth = 1;

        for (let x = 0; x <= cols; x += 1) {
          ctx.beginPath();
          ctx.moveTo(x * cellSize, 0);
          ctx.lineTo(x * cellSize, height);
          ctx.stroke();
        }

        for (let y = 0; y <= rows; y += 1) {
          ctx.beginPath();
          ctx.moveTo(0, y * cellSize);
          ctx.lineTo(width, y * cellSize);
          ctx.stroke();
        }

        if (!command) {
          ctx.textAlign = "center";
          ctx.fillStyle = state.completedRounds >= totalRounds ? "#33ff33" : "#666666";
          ctx.font = "28px Departure Mono, monospace";
          ctx.fillText(state.completedRounds >= totalRounds ? "SISTEMA HACKEADO!" : "WAITING...", width / 2, height / 2);
          drawTerminalEffects(ctx, width, height, effects);
          ctx.restore();
          return;
        }

        const fontSize = Math.max(14, cellSize * 0.7);
        const baseline = height / 2 + 20;
        const startX = 20;

        ctx.textAlign = "left";
        ctx.font = fontSize + "px Departure Mono, monospace";

        for (let index = 0; index < command.length; index += 1) {
          if (index < input.length) {
            ctx.fillStyle = "#33ff33";
          } else if (index === input.length && (isLocal ? !state.awaitingRoundAck : input.length > 0)) {
            ctx.fillStyle = "#ffffff";
          } else {
            ctx.fillStyle = "#666666";
          }

          ctx.fillText(command[index], startX + index * fontSize * 0.55, baseline);
        }

        if ((isLocal ? !state.awaitingRoundAck : input.length > 0) && Math.floor(ticker * 3) % 2 === 0) {
          ctx.fillStyle = "#ffa133";
          ctx.fillRect(startX + input.length * fontSize * 0.55, baseline + 4, 2, fontSize - 8);
        }

        ctx.font = "10px Departure Mono, monospace";
        ctx.fillStyle = "#666666";
        ctx.textAlign = "left";
        ctx.fillText("WORDS:" + state.completedRounds, 20, height - 25);
        ctx.fillText("MODE:" + (isLocal ? "TYPING" : "REMOTE"), 20, height - 10);

        ctx.fillStyle = "#ffa133";
        ctx.textAlign = "right";
        ctx.fillText(isLocal ? "> root@terminal" : "> remote@terminal", width - 20, height - 10);
        drawTerminalEffects(ctx, width, height, effects);
        ctx.restore();
      }

      function updateTimer() {
        if (!startTimestamp) {
          elements.timerValue.textContent = (roundTimeLimitMs / 1000).toFixed(1) + "s";
          return;
        }

        const remainingMs = Math.max(0, roundTimeLimitMs - (Date.now() - startTimestamp));
        elements.timerValue.textContent = (remainingMs / 1000).toFixed(1) + "s";

        if (remainingMs <= 0 && !gameOver) {
          setNotice("tempo esgotado. aguardando resolucao do servidor...", "warning");
        }
      }

      function updateEffects(effects, delta) {
        effects.shake = Math.max(0, effects.shake - delta * 4.8);
        effects.corrupt = Math.max(0, effects.corrupt - delta * 1.8);

        effects.particles = effects.particles.filter(function(particle) {
          particle.life -= delta;
          particle.x += particle.vx * delta;
          particle.y += particle.vy * delta;
          particle.vy += 70 * delta;
          return particle.life > 0;
        });

        effects.floatingTexts = effects.floatingTexts.filter(function(text) {
          text.life -= delta;
          text.y -= text.speed * delta;
          return text.life > 0;
        });

        effects.flashes = effects.flashes.filter(function(flash) {
          flash.life -= delta;
          return flash.life > 0;
        });

        effects.glitches = effects.glitches.filter(function(slice) {
          slice.life -= delta;
          slice.x += slice.vx * delta;
          return slice.life > 0;
        });
      }

      function drawTerminalEffects(ctx, width, height, effects) {
        drawFlashes(ctx, width, height, effects);
        drawGlitches(ctx, width, height, effects);
        drawParticles(ctx, effects);
        drawFloatingTexts(ctx, effects);

        if (effects.corrupt > 0) {
          ctx.fillStyle = "rgba(255, 51, 51, " + (0.12 * effects.corrupt).toFixed(3) + ")";
          for (let y = 0; y < height; y += 14) {
            if ((y / 14) % 2 === 0) {
              ctx.fillRect(0, y, width, 3);
            }
          }
        }
      }

      function drawFlashes(ctx, width, height, effects) {
        effects.flashes.forEach(function(flash) {
          const alpha = Math.max(0, flash.life / flash.duration) * flash.alpha;
          ctx.fillStyle = colorWithAlpha(flash.color, alpha);
          ctx.fillRect(0, 0, width, height);
        });
      }

      function drawGlitches(ctx, width, height, effects) {
        effects.glitches.forEach(function(slice) {
          const alpha = Math.max(0, slice.life / slice.duration);
          ctx.fillStyle = colorWithAlpha(slice.color, alpha * 0.85);
          ctx.fillRect(slice.x, slice.y, width * slice.width, slice.height);
        });
      }

      function drawParticles(ctx, effects) {
        effects.particles.forEach(function(particle) {
          const alpha = Math.max(0, particle.life / particle.duration);
          ctx.fillStyle = colorWithAlpha(particle.color, alpha);
          ctx.fillRect(Math.round(particle.x), Math.round(particle.y), particle.size, particle.size);
        });
      }

      function drawFloatingTexts(ctx, effects) {
        effects.floatingTexts.forEach(function(text) {
          const alpha = Math.max(0, text.life / text.duration);
          ctx.font = "10px Departure Mono, monospace";
          ctx.textAlign = "left";
          ctx.fillStyle = colorWithAlpha(text.color, alpha);
          ctx.fillText(text.value, text.x, text.y);
        });
      }

      function spawnCorrectKey(effects, state, command) {
        const point = getCursorPoint(state, command, true);
        spawnPixelBurst(effects, point.x, point.y, "#33ff33", 5);
        spawnFlash(effects, "#ffa133", 0.08, 0.08);
        playCorrectSound(state.input.length);

        if (state.input.length % 4 === 0) {
          spawnFloatingText(effects, "+OK", point.x + 10, point.y - 12, "#ffa133", 0.32);
        }
      }

      function spawnMiss(effects) {
        effects.shake = Math.max(effects.shake, 1);
        effects.corrupt = Math.max(effects.corrupt, 0.45);
        spawnFlash(effects, "#ff3333", 0.2, 0.16);
        spawnGlitch(effects, "#ff3333", 3);
        spawnFloatingText(effects, "MISS", 28, 70, "#ff3333", 0.42);
        playMissSound();
      }

      function spawnDeleteEffect(effects) {
        effects.shake = Math.max(effects.shake, 0.32);
        spawnGlitch(effects, "#ffa133", 1);
        spawnFloatingText(effects, "DEL", 28, 84, "#ffa133", 0.28);
        playDeleteSound();
      }

      function spawnRoundClear(effects, isLocal) {
        effects.shake = Math.max(effects.shake, isLocal ? 0.75 : 0.45);
        spawnFlash(effects, "#33ff33", 0.22, 0.18);
        spawnGlitch(effects, "#33ff33", 4);
        spawnFloatingText(effects, isLocal ? "ROUND CLEAR" : "REMOTE +1", 24, 58, "#33ff33", 0.7);
        spawnPixelBurst(effects, 120, 90, "#33ff33", 18);
        playRoundClearSound(isLocal);
      }

      function spawnBoot(effects) {
        spawnFlash(effects, "#ffa133", 0.16, 0.2);
        spawnGlitch(effects, "#ffa133", 5);
        spawnFloatingText(effects, "READY", 24, 58, "#ffa133", 0.55);
      }

      function spawnFinalEffect(mode) {
        playFinalSound(mode);

        if (mode === "win") {
          spawnRoundClear(effectState.local, true);
          spawnFlash(effectState.remote, "#33ff33", 0.18, 0.28);
          return;
        }

        if (mode === "lose") {
          effectState.local.corrupt = 1;
          effectState.local.shake = 1.3;
          spawnFlash(effectState.local, "#ff3333", 0.22, 0.35);
          spawnGlitch(effectState.local, "#ff3333", 8);
          spawnFloatingText(effectState.local, "SYSTEM CORRUPTED", 24, 58, "#ff3333", 0.7);
          return;
        }

        spawnFlash(effectState.local, "#ffa133", 0.18, 0.28);
        spawnFlash(effectState.remote, "#ffa133", 0.18, 0.28);
        spawnGlitch(effectState.local, "#ffa133", 4);
        spawnGlitch(effectState.remote, "#ffa133", 4);
      }

      function unlockAudio() {
        const context = getAudioContext();
        if (!context) {
          return;
        }

        if (context.state === "suspended") {
          context.resume().catch(function() {});
        }

        audioUnlocked = true;
      }

      function getAudioContext() {
        if (audioContext) {
          return audioContext;
        }

        const AudioCtor = window.AudioContext || window.webkitAudioContext;
        if (!AudioCtor) {
          return null;
        }

        audioContext = new AudioCtor();
        audioMaster = audioContext.createGain();
        audioMaster.gain.value = 0.18;
        audioMaster.connect(audioContext.destination);
        return audioContext;
      }

      function playTone(frequency, duration, options) {
        const context = getAudioContext();
        if (!context || !audioMaster) {
          return;
        }

        const settings = options || {};
        const start = context.currentTime + (settings.delay || 0);
        const oscillator = context.createOscillator();
        const gain = context.createGain();
        const volume = settings.volume || 0.28;

        oscillator.type = settings.type || "square";
        oscillator.frequency.setValueAtTime(frequency, start);

        if (settings.endFrequency) {
          oscillator.frequency.exponentialRampToValueAtTime(Math.max(1, settings.endFrequency), start + duration);
        }

        gain.gain.setValueAtTime(0.0001, start);
        gain.gain.exponentialRampToValueAtTime(volume, start + 0.008);
        gain.gain.exponentialRampToValueAtTime(0.0001, start + duration);

        oscillator.connect(gain);
        gain.connect(audioMaster);
        oscillator.start(start);
        oscillator.stop(start + duration + 0.02);
      }

      function playNoise(duration, options) {
        const context = getAudioContext();
        if (!context || !audioMaster) {
          return;
        }

        const settings = options || {};
        const start = context.currentTime + (settings.delay || 0);
        const sampleRate = context.sampleRate;
        const buffer = context.createBuffer(1, Math.max(1, Math.floor(sampleRate * duration)), sampleRate);
        const data = buffer.getChannelData(0);

        for (let index = 0; index < data.length; index += 1) {
          data[index] = (Math.random() * 2 - 1) * (1 - index / data.length);
        }

        const source = context.createBufferSource();
        const filter = context.createBiquadFilter();
        const gain = context.createGain();

        filter.type = settings.filterType || "bandpass";
        filter.frequency.setValueAtTime(settings.frequency || 900, start);
        filter.Q.value = settings.q || 8;

        gain.gain.setValueAtTime(settings.volume || 0.18, start);
        gain.gain.exponentialRampToValueAtTime(0.0001, start + duration);

        source.buffer = buffer;
        source.connect(filter);
        filter.connect(gain);
        gain.connect(audioMaster);
        source.start(start);
      }

      function playSequence(notes, baseDelay) {
        notes.forEach(function(note, index) {
          playTone(note[0], note[1], {
            delay: (baseDelay || 0) + (note[2] || index * 0.055),
            volume: note[3] || 0.22,
            type: note[4] || "square",
            endFrequency: note[5]
          });
        });
      }

      function playCorrectSound(step) {
        const pitch = 420 + (step % 8) * 36;
        playTone(pitch, 0.035, { volume: 0.16, type: "square", endFrequency: pitch * 1.22 });
        playTone(pitch * 2, 0.028, { delay: 0.012, volume: 0.08, type: "triangle" });
      }

      function playMissSound() {
        playTone(190, 0.11, { volume: 0.26, type: "sawtooth", endFrequency: 78 });
        playNoise(0.09, { delay: 0.015, volume: 0.12, frequency: 520, q: 14 });
      }

      function playDeleteSound() {
        playTone(320, 0.045, { volume: 0.11, type: "square", endFrequency: 210 });
        playNoise(0.035, { delay: 0.02, volume: 0.07, frequency: 1200, q: 10 });
      }

      function playRoundClearSound(isLocal) {
        const volume = isLocal ? 0.2 : 0.1;
        playSequence([
          [520, 0.06, 0, volume],
          [660, 0.06, 0.06, volume],
          [880, 0.11, 0.13, volume + 0.03]
        ]);
      }

      function playBootSound() {
        playSequence([
          [180, 0.045, 0, 0.1],
          [260, 0.045, 0.05, 0.12],
          [390, 0.06, 0.11, 0.14],
          [520, 0.08, 0.18, 0.16]
        ]);
      }

      function playFinalSound(mode) {
        if (mode === "win") {
          playSequence([
            [440, 0.08, 0, 0.22],
            [660, 0.08, 0.08, 0.22],
            [880, 0.1, 0.17, 0.25],
            [1320, 0.18, 0.3, 0.2, "triangle"]
          ]);
          return;
        }

        if (mode === "lose") {
          playTone(260, 0.18, { volume: 0.25, type: "sawtooth", endFrequency: 72 });
          playNoise(0.22, { delay: 0.04, volume: 0.16, frequency: 360, q: 5 });
          playTone(110, 0.2, { delay: 0.18, volume: 0.14, type: "square", endFrequency: 55 });
          return;
        }

        playSequence([
          [330, 0.08, 0, 0.16],
          [330, 0.08, 0.12, 0.16],
          [260, 0.12, 0.24, 0.13]
        ]);
      }

      function playUiSound() {
        unlockAudio();
        playTone(520, 0.045, { volume: 0.11, type: "square", endFrequency: 660 });
      }

      function spawnPixelBurst(effects, x, y, color, count) {
        for (let index = 0; index < count; index += 1) {
          const angle = Math.random() * Math.PI * 2;
          const speed = 45 + Math.random() * 120;
          effects.particles.push({
            x,
            y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            size: 2 + Math.floor(Math.random() * 4),
            color,
            life: 0.18 + Math.random() * 0.28,
            duration: 0.46
          });
        }
      }

      function spawnFloatingText(effects, value, x, y, color, duration) {
        effects.floatingTexts.push({
          value,
          x,
          y,
          color,
          life: duration,
          duration,
          speed: 16 + Math.random() * 12
        });
      }

      function spawnFlash(effects, color, alpha, duration) {
        effects.flashes.push({
          color,
          alpha,
          life: duration,
          duration
        });
      }

      function spawnGlitch(effects, color, count) {
        for (let index = 0; index < count; index += 1) {
          const duration = 0.08 + Math.random() * 0.2;
          effects.glitches.push({
            x: -20 + Math.random() * 40,
            y: 24 + Math.random() * 220,
            vx: -55 + Math.random() * 110,
            width: 0.4 + Math.random() * 0.9,
            height: 2 + Math.floor(Math.random() * 8),
            color,
            life: duration,
            duration
          });
        }
      }

      function getCursorPoint(state, command, isLocal) {
        const canvas = isLocal ? elements.canvasLeft : elements.canvasRight;
        const width = Math.max(1, canvas.width);
        const height = Math.max(1, canvas.height);
        const cellSize = Math.min(width / 16, height / 9);
        const fontSize = Math.max(14, cellSize * 0.7);
        return {
          x: 20 + Math.min((state.input || "").length, (command || "").length) * fontSize * 0.55,
          y: height / 2 + 20
        };
      }

      function colorWithAlpha(color, alpha) {
        const hex = color.replace("#", "");
        const red = parseInt(hex.slice(0, 2), 16);
        const green = parseInt(hex.slice(2, 4), 16);
        const blue = parseInt(hex.slice(4, 6), 16);
        return "rgba(" + red + "," + green + "," + blue + "," + Math.max(0, Math.min(1, alpha)) + ")";
      }

      function refreshUi() {
        const localProgress = totalProgress(localState);
        const remoteProgress = totalProgress(remoteState);
        const myRoundDisplay = Math.min(localState.completedRounds + 1, totalRounds);
        const oppRoundDisplay = Math.min(remoteState.completedRounds + 1, totalRounds);

        elements.progressLeft.style.width = localProgress + "%";
        elements.progressRight.style.width = remoteProgress + "%";
        elements.myProgressText.textContent = localProgress.toFixed(0);
        elements.oppProgressText.textContent = remoteProgress.toFixed(0);
        elements.myRoundValue.textContent = myRoundDisplay + " / " + totalRounds;
        elements.oppRoundValue.textContent = oppRoundDisplay + " / " + totalRounds;
        elements.telemetryRound.textContent = oppRoundDisplay + " / " + totalRounds;
        elements.telemetryInput.textContent = String(remoteState.input.length);
        elements.telemetryProgress.textContent = (remoteState.progress || 0).toFixed(0) + "%";

        elements.myStateText.textContent = localState.awaitingRoundAck
          ? "aguardando ack"
          : gameStarted
            ? "digitando"
            : "preparando";

        elements.oppStateText.textContent = remoteState.disconnected
          ? "offline"
          : remoteState.input.length > 0
            ? "digitando"
            : "aguardando";

        elements.telemetryStatus.textContent = remoteState.disconnected
          ? "offline"
          : remoteState.input.length > 0
            ? "ativo"
            : "stand-by";
      }

      function totalProgress(state) {
        const command = getCurrentCommand(state);
        const fractional = command ? calculateCommandProgress(state.input, command) / 100 : 0;
        const completed = Math.min(totalRounds, state.completedRounds + fractional);
        return Math.min(100, (completed / totalRounds) * 100);
      }

      function calculateCommandProgress(input, command) {
        if (!command) {
          return 0;
        }

        return (input.length / command.length) * 100;
      }

      function getCurrentCommand(state) {
        if (!commands.length || state.roundIndex >= commands.length) {
          return "";
        }

        return commands[state.roundIndex];
      }

      function setNotice(text, tone) {
        elements.statusBanner.textContent = text;
        elements.statusBanner.dataset.tone = tone || "info";
      }

      function updateConnectionStatus(state) {
        const label = {
          connected: "online",
          connecting: "conectando",
          offline: "offline"
        }[state];

        elements.connectionPill.dataset.state = state;
        elements.connectionStatus.textContent = label;
        elements.hudConnectionValue.textContent = label;
      }

      function finalizeFromServer(message) {
        const localRounds = gameData.playerIndex === 0 ? message.player0Rounds : message.player1Rounds;
        const remoteRounds = gameData.playerIndex === 0 ? message.player1Rounds : message.player0Rounds;

        if (typeof localRounds === "number") {
          localState.completedRounds = localRounds;
          localState.roundIndex = localRounds;
          localState.input = "";
          localState.progress = 0;
        }

        if (typeof remoteRounds === "number") {
          remoteState.completedRounds = remoteRounds;
          remoteState.roundIndex = remoteRounds;
          remoteState.input = "";
          remoteState.progress = 0;
        }

        if (message.reason === "timeout_draw" || !message.winner) {
          finalizeMatch("draw", "tempo encerrado com progresso empatado. sem ponto para os dois.", message.reason);
          return;
        }

        if (isSpectator) {
          const winnerName = String(message.winner || "").toUpperCase();
          finalizeMatch("draw", winnerName + " venceu a partida.", message.reason);
          return;
        }

        const mode = message.winner === username ? "win" : "lose";
        finalizeMatch(mode, resultCopy(mode, message.reason), message.reason);
      }

      function finalizeMatch(mode, message, reason) {
        if (resultShown) {
          return;
        }

        resultShown = true;
        gameOver = true;
        localState.awaitingRoundAck = false;
        refreshUi();
        spawnFinalEffect(mode);

        track(isSpectator ? "spectate_finished" : "match_finished", {
          result: mode,
          reason: reason || "",
          my_rounds: localState.completedRounds,
          opp_rounds: remoteState.completedRounds,
          total_rounds: totalRounds,
          duration_ms: gameStartedAt ? Date.now() - gameStartedAt : 0,
          total_misses: totalMissCount,
          dead_keys_blocked: totalDeadKeyBlocked,
          opponent: gameData.opponent,
          game_id: gameData.gameId
        });

        elements.resultOverlay.classList.remove("hidden");
        elements.resultMyScore.textContent = localState.completedRounds + " / " + totalRounds;
        elements.resultOppScore.textContent = remoteState.completedRounds + " / " + totalRounds;
        elements.resultSub.textContent = message;

        if (mode === "win") {
          elements.resultEyebrow.textContent = reason === "forfeit" ? "Forfeit confirmed" : "Match won";
          elements.resultText.textContent = "sistema hackeado";
          elements.resultText.style.color = "#7ffd9d";
          launchConfetti();
        } else if (mode === "lose") {
          elements.resultEyebrow.textContent = "Match lost";
          elements.resultText.textContent = "intrusao falhou";
          elements.resultText.style.color = "#ff6f8f";
        } else {
          elements.resultEyebrow.textContent = "Draw";
          elements.resultText.textContent = "timeout travado";
          elements.resultText.style.color = "#ffaf45";
        }
      }

      function resultCopy(mode, reason) {
        if (reason === "forfeit") {
          return mode === "win"
            ? "o rival abandonou a sala. a vitoria conta no ranking."
            : "sua conexao caiu e a partida foi encerrada por abandono.";
        }

        if (reason === "timeout") {
          return mode === "win"
            ? "o tempo acabou, mas seu progresso foi maior."
            : "o tempo acabou e o rival terminou com mais progresso.";
        }

        if (reason === "finish") {
          return mode === "win"
            ? "voce fechou os cinco rounds primeiro e levou o ponto."
            : "o rival concluiu os cinco rounds antes de voce.";
        }

        return messageFallback(mode);
      }

      function messageFallback(mode) {
        if (mode === "win") {
          return "partida concluida com sucesso.";
        }

        if (mode === "lose") {
          return "o rival tomou a frente desta vez.";
        }

        return "a partida terminou empatada.";
      }

      function launchConfetti() {
        const canvas = elements.confettiCanvas;
        const ctx = canvas.getContext("2d");
        const width = window.innerWidth;
        const height = window.innerHeight;
        const colors = ["#ffaf45", "#7ffd9d", "#4fd8c6", "#f3f1ea", "#ff6f8f"];

        canvas.width = width;
        canvas.height = height;
        canvas.classList.add("active");

        confettiParticles = Array.from({ length: 120 }).map(function(_, index) {
          return {
            x: Math.random() * width,
            y: -20 - index * 5,
            size: 4 + Math.floor(Math.random() * 9),
            speedY: 2 + Math.random() * 5,
            speedX: -3 + Math.random() * 6,
            flicker: Math.random() > 0.5,
            color: colors[index % colors.length]
          };
        });

        if (confettiFrame) {
          cancelAnimationFrame(confettiFrame);
        }

        function draw() {
          ctx.clearRect(0, 0, width, height);

          confettiParticles.forEach(function(particle) {
            particle.x += particle.speedX;
            particle.y += particle.speedY;

            if (particle.flicker && Math.floor(particle.y / 12) % 2 === 0) {
              return;
            }

            ctx.fillStyle = particle.color;
            ctx.fillRect(Math.round(particle.x), Math.round(particle.y), particle.size, particle.size);
          });

          confettiParticles = confettiParticles.filter(function(particle) {
            return particle.y < height + 40;
          });

          if (confettiParticles.length) {
            confettiFrame = requestAnimationFrame(draw);
          } else {
            confettiFrame = null;
            canvas.classList.remove("active");
          }
        }

        confettiFrame = requestAnimationFrame(draw);
      }

      function updateConfetti() {
        if (!confettiParticles.length && elements.confettiCanvas.classList.contains("active") && !confettiFrame) {
          elements.confettiCanvas.classList.remove("active");
        }
      }

      function isSocketOpen() {
        return ws && ws.readyState === WebSocket.OPEN;
      }

      init();
    })();
  </script>
</body>
